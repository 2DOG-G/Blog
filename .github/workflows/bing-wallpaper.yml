name: Fetch Bing Daily Wallpaper

on:
  schedule:
    # 每天UTC时间 0:00 执行 (北京时间 8:00)
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-wallpaper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Bing wallpaper
        run: python scripts/fetch_bing_wallpaper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/wallpaper.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Bing daily wallpaper - $(date +'%Y-%m-%d')" && git push)
