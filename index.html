<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing每日一图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .image-container {
            position: relative;
            padding-bottom: 66.67%;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .image-card:hover .image-container img {
            transform: scale(1.05);
        }

        .image-date {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .image-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .image-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .image-copyright {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .image-link {
            font-size: 0.85em;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .image-link:hover {
            color: #764ba2;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .gallery {
                grid-template-columns: 1fr;
            }
        }

        .last-updated {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🖼️ Bing每日一图</h1>
            <p>每天为你展示Bing精美壁纸</p>
        </header>

        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                加载中...
            </div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        async function loadImages() {
            try {
                const response = await fetch('./data/bing-images.json');
                if (!response.ok) {
                    throw new Error('无法加载图片数据');
                }

                const images = await response.json();

                if (images.length === 0) {
                    showEmptyState();
                    return;
                }

                displayImages(images);
                updateLastUpdated(images[0].date);
            } catch (error) {
                console.error('加载失败:', error);
                showError(error.message);
            }
        }

        function displayImages(images) {
            const gallery = document.createElement('div');
            gallery.className = 'gallery';

            images.forEach(image => {
                const card = createImageCard(image);
                gallery.appendChild(card);
            });

            const content = document.getElementById('content');
            content.innerHTML = '';
            content.appendChild(gallery);
        }

        function createImageCard(image) {
            const card = document.createElement('div');
            card.className = 'image-card';

            const imageContainer = document.createElement('div');
            imageContainer.className = 'image-container';

            const img = document.createElement('img');
            img.src = image.url;
            img.alt = image.title;
            img.loading = 'lazy';

            const dateTag = document.createElement('div');
            dateTag.className = 'image-date';
            dateTag.textContent = formatDate(image.date);

            const info = document.createElement('div');
            info.className = 'image-info';

            const title = document.createElement('div');
            title.className = 'image-title';
            title.textContent = image.title;

            const copyright = document.createElement('div');
            copyright.className = 'image-copyright';
            copyright.textContent = image.copyright;

            const link = document.createElement('a');
            link.className = 'image-link';
            link.href = image.link || '#';
            link.target = '_blank';
            link.textContent = '了解更多 →';

            imageContainer.appendChild(img);
            imageContainer.appendChild(dateTag);
            info.appendChild(title);
            info.appendChild(copyright);
            info.appendChild(link);
            card.appendChild(imageContainer);
            card.appendChild(info);

            return card;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (dateStr === today.toISOString().split('T')[0]) {
                return '今天';
            } else if (dateStr === yesterday.toISOString().split('T')[0]) {
                return '昨天';
            } else {
                return dateStr;
            }
        }

        function updateLastUpdated(date) {
            const element = document.getElementById('lastUpdated');
            element.textContent = `最后更新: ${date}`;
        }

        function showEmptyState() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="empty-state">
                    <h2>💭 暂无数据</h2>
                    <p>图片还在抓取中，请稍后再试</p>
                </div>
            `;
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="empty-state">
                    <h2>❌ 出错了</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // 页面加载时获取图片
        loadImages();

        // 每5分钟刷新一次数据
        setInterval(loadImages, 5 * 60 * 1000);
    </script>
</body>

</html>
