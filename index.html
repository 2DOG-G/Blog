<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing 每日一图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-image.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .card-content {
            padding: 20px;
        }

        .card-date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .card-description {
            font-size: 0.95em;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-links {
            display: flex;
            gap: 10px;
        }

        .card-link {
            flex: 1;
            padding: 8px 12px;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .card-link.view {
            background: #667eea;
            color: white;
        }

        .card-link.view:hover {
            background: #5568d3;
        }

        .card-link.download {
            background: #764ba2;
            color: white;
        }

        .card-link.download:hover {
            background: #63408a;
        }

        .loading-section {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .refresh-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .card-links {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🖼️ Bing 每日一图</h1>
            <p>每天更新来自全球的精美背景图片</p>
        </header>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="refresh-btn" onclick="loadWallpapers()">🔄 刷新</button>
        </div>

        <div id="error-container"></div>
        <div id="gallery" class="gallery">
            <div class="loading-section">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <footer>
            <p>© 2024 Bing Daily Wallpaper | 数据来源：微软 Bing</p>
            <p style="font-size: 0.9em; margin-top: 10px;">自动更新于每天 UTC 0:00 (北京时间 08:00)</p>
        </footer>
    </div>

    <script>
        async function loadWallpapers() {
            const gallery = document.getElementById('gallery');
            const errorContainer = document.getElementById('error-container');

            // 清空错误信息
            errorContainer.innerHTML = '';

            // 显示加载状态
            gallery.innerHTML = `
                <div class="loading-section" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            `;

            try {
                const response = await fetch('data/wallpaper.json');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const wallpapers = await response.json();

                if (!wallpapers || wallpapers.length === 0) {
                    gallery.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <p>暂无数据，请稍后再试</p>
                        </div>
                    `;
                    return;
                }

                // 渲染卡片
                gallery.innerHTML = wallpapers.map((wallpaper, index) => `
                    <div class="card">
                        <div class="card-image loading">
                            <img 
                                src="${wallpaper.image_url}" 
                                alt="${wallpaper.title}"
                                onload="this.parentElement.classList.remove('loading')"
                                onerror="this.parentElement.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'; this.style.display='none';"
                            />
                        </div>
                        <div class="card-content">
                            <div class="card-date">${formatDate(wallpaper.date)}</div>
                            <div class="card-title">${escapeHtml(wallpaper.title)}</div>
                            <div class="card-description">${escapeHtml(wallpaper.description)}</div>
                            <div class="card-links">
                                <a href="${wallpaper.image_url}" target="_blank" class="card-link view">
                                    👁️ 查看
                                </a>
                                <a href="${wallpaper.hd_url}" download class="card-link download">
                                    ⬇️ 下载
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('加载失败:', error);
                errorContainer.innerHTML = `
                    <div class="error">
                        ⚠️ 加载失败: ${error.message}
                        <br/>
                        <small>请确保 data/wallpaper.json 文件存在</small>
                    </div>
                `;
                gallery.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <p>加载失败，请检查数据文件</p>
                    </div>
                `;
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '日期未知';
            const year = dateStr.slice(0, 4);
            const month = dateStr.slice(4, 6);
            const day = dateStr.slice(6, 8);
            return `${year}年${month}月${day}日`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 页面加载时获取数据
        loadWallpapers();
    </script>
</body>

</html>
