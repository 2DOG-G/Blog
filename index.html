<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
        }

        img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>
    <img id="bgImg" src="" alt="" />
    <script>
        async function loadWallpaper() {
            try {
                const response = await fetch('data/wallpaper.json');
                if (!response.ok) throw new Error('Failed to load data');

                const wallpapers = await response.json();
                if (!wallpapers || wallpapers.length === 0) throw new Error('No data');

                const wallpaper = wallpapers[0];
                const imgUrl = wallpaper['4k_url'] || wallpaper.hd_url || wallpaper.image_url;

                document.getElementById('bgImg').src = imgUrl;
            } catch (error) {
                console.error('Error:', error);
                document.body.style.background = '#1a1a1a';
            }
        }

        loadWallpaper();
    </script>
</body>

</html>
